<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#16261a">
<title>Which (Obscure) Lord of the Rings Character Are You? · 40th for Sean & Tom</title>
<meta name="description" content="A deeply nerdy LOTR character quiz for Sean & Tom's joint 40th birthday party in Fort Collins, August 8.">
<meta property="og:title" content="Which (Obscure) LOTR Character Are You?">
<meta property="og:description" content="A deeply nerdy LOTR quiz for Sean & Tom's 40th. Fort Collins, Aug 8.">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<style>
  :root {
    --parchment: #f1e2b3;
    --parchment-warm: #ecd594;
    --parchment-shadow: #b89b62;
    --ink: #2a1809;
    --ink-soft: #4a3015;
    --ink-faded: #6f5530;
    --forest: #2a4628;
    --forest-deep: #16261a;
    --night: #0b1410;
    --gold: #b8923a;
    --gold-bright: #e6b94a;
    --gold-deep: #7a611a;
    --burgundy: #7a2a2a;
    --burgundy-bright: #a13a3a;
    --amber: #d18a3a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--night);
    color: var(--ink);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 18px;
    line-height: 1.55;
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* night-meadow background: dark forest with warm lantern glows and faint stars */
  body {
    background:
      radial-gradient(circle at 15% 18%, rgba(230, 185, 74, 0.10), transparent 35%),
      radial-gradient(circle at 88% 25%, rgba(209, 138, 58, 0.08), transparent 30%),
      radial-gradient(circle at 25% 85%, rgba(184, 146, 58, 0.07), transparent 40%),
      radial-gradient(circle at 75% 95%, rgba(230, 185, 74, 0.05), transparent 35%),
      radial-gradient(ellipse at 50% 0%, rgba(122, 97, 26, 0.18), transparent 50%),
      var(--night);
    background-attachment: fixed;
    padding: 16px;
    padding-top: max(20px, env(safe-area-inset-top));
    padding-bottom: max(30px, env(safe-area-inset-bottom));
    position: relative;
    overflow-x: hidden;
  }

  /* scattered stars in night sky */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 12%, rgba(255,240,200,0.6), transparent),
      radial-gradient(1px 1px at 80% 18%, rgba(255,240,200,0.5), transparent),
      radial-gradient(1px 1px at 30% 32%, rgba(255,240,200,0.4), transparent),
      radial-gradient(1px 1px at 92% 45%, rgba(255,240,200,0.5), transparent),
      radial-gradient(1.5px 1.5px at 60% 8%, rgba(255,240,200,0.7), transparent),
      radial-gradient(1px 1px at 15% 60%, rgba(255,240,200,0.4), transparent),
      radial-gradient(1px 1px at 70% 70%, rgba(255,240,200,0.3), transparent),
      radial-gradient(1px 1px at 45% 22%, rgba(255,240,200,0.5), transparent);
    pointer-events: none;
    z-index: 0;
  }

  /* hanging bunting at very top of screen */
  .bunting {
    max-width: 540px;
    margin: 0 auto -8px;
    display: block;
    position: relative;
    z-index: 2;
  }

  .scroll {
    max-width: 540px;
    margin: 0 auto;
    background: var(--parchment);
    background-image:
      radial-gradient(ellipse at top left, rgba(139, 90, 31, 0.10), transparent 45%),
      radial-gradient(ellipse at bottom right, rgba(139, 90, 31, 0.13), transparent 50%),
      radial-gradient(circle at 80% 30%, rgba(122, 42, 42, 0.05), transparent 30%),
      radial-gradient(circle at 20% 75%, rgba(184, 146, 58, 0.08), transparent 30%),
      /* aged stains */
      radial-gradient(circle at 12% 8%, rgba(107, 64, 20, 0.15), transparent 8%),
      radial-gradient(circle at 88% 92%, rgba(107, 64, 20, 0.12), transparent 7%),
      radial-gradient(circle at 50% 55%, rgba(107, 64, 20, 0.06), transparent 12%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240' viewBox='0 0 240 240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' seed='7'/><feColorMatrix values='0 0 0 0 0.18 0 0 0 0 0.12 0 0 0 0 0.05 0 0 0 0.18 0'/></filter><rect width='240' height='240' filter='url(%23n)' opacity='0.55'/></svg>");
    border-radius: 4px;
    box-shadow:
      0 0 0 1px var(--gold-deep),
      0 0 0 4px var(--parchment),
      0 0 0 5px var(--gold-deep),
      0 35px 70px -15px rgba(0,0,0,0.7),
      inset 0 0 80px rgba(122, 80, 20, 0.18);
    padding: 32px 22px 32px;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  /* aged corner shadows */
  .scroll::before, .scroll::after {
    content: '';
    position: absolute;
    width: 120px; height: 120px;
    pointer-events: none;
  }
  .scroll::before {
    top: -20px; left: -20px;
    background: radial-gradient(ellipse at center, rgba(74, 48, 21, 0.25), transparent 65%);
  }
  .scroll::after {
    bottom: -20px; right: -20px;
    background: radial-gradient(ellipse at center, rgba(74, 48, 21, 0.28), transparent 65%);
  }

  /* ----------- TYPOGRAPHY ----------- */
  h1, h2, h3 { font-family: 'Cinzel', serif; font-weight: 600; color: var(--forest-deep); letter-spacing: 0.02em; line-height: 1.15; }
  h1 { font-size: 1.6rem; text-align: center; }
  h2 { font-size: 1.3rem; }
  h3 { font-size: 1.05rem; }

  .italic { font-family: 'IM Fell English', serif; font-style: italic; color: var(--ink-soft); }

  .eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--gold-deep);
    text-align: center;
    margin-bottom: 10px;
  }

  /* firework section divider */
  .firework-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin: 18px auto;
    color: var(--gold-deep);
  }
  .firework-divider::before, .firework-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold-deep), transparent);
    max-width: 130px;
  }
  .firework-divider svg { display: block; }

  /* ----------- INTRO ----------- */
  .intro p { margin: 12px 0; color: var(--ink-soft); }
  .intro .lead { font-size: 1.05rem; }
  .party-card {
    margin: 22px 0 18px;
    padding: 16px 18px;
    background: rgba(122, 42, 42, 0.06);
    border-left: 3px solid var(--burgundy);
    border-radius: 2px;
    font-style: italic;
    color: var(--ink-soft);
    position: relative;
  }
  .party-card strong {
    font-style: normal;
    color: var(--burgundy);
    font-family: 'Cinzel', serif;
    font-weight: 600;
    font-size: 0.9em;
    letter-spacing: 0.05em;
  }

  /* ----------- BUTTONS ----------- */
  .btn {
    display: block;
    width: 100%;
    padding: 14px 18px;
    margin-top: 18px;
    background: var(--forest);
    color: var(--parchment);
    border: none;
    border-radius: 3px;
    font-family: 'Cinzel', serif;
    font-size: 0.95rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    box-shadow:
      inset 0 0 0 1px var(--gold-deep),
      0 4px 0 var(--forest-deep),
      0 6px 18px -4px rgba(0,0,0,0.35);
  }
  .btn:active { transform: translateY(3px); box-shadow: inset 0 0 0 1px var(--gold-deep), 0 1px 0 var(--forest-deep); }
  .btn:hover { background: var(--forest-deep); }

  .btn-ghost {
    background: transparent;
    color: var(--forest-deep);
    border: 1px solid var(--gold-deep);
    box-shadow: none;
    margin-top: 12px;
  }
  .btn-ghost:active { transform: translateY(1px); box-shadow: none; }
  .btn-ghost:hover { background: rgba(184,146,58,0.12); }

  /* ----------- ANSWERS ----------- */
  .answers { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
  .answer {
    text-align: left;
    padding: 14px 16px;
    background: rgba(241, 226, 179, 0.55);
    border: 1px solid var(--parchment-shadow);
    border-left: 3px solid var(--gold);
    border-radius: 2px;
    font-family: 'EB Garamond', serif;
    font-size: 1.02rem;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.18s ease;
    line-height: 1.4;
  }
  .answer:hover { background: rgba(184, 146, 58, 0.18); border-left-color: var(--burgundy); transform: translateX(2px); }
  .answer:active { background: rgba(42, 70, 40, 0.18); }

  /* ----------- QUESTION SCREEN ----------- */
  .progress-row {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Cinzel', serif;
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    color: var(--gold-deep);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  /* back button: small, ornamental, top-left of question/gender screens */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: none;
    color: var(--gold-deep);
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px 2px;
    margin: -4px 0 8px -2px;
    transition: color 0.15s ease, transform 0.15s ease;
  }
  .back-btn:hover { color: var(--burgundy); transform: translateX(-2px); }
  .back-btn:active { transform: translateX(-4px); }
  .back-btn span.arrow { font-size: 1rem; line-height: 1; letter-spacing: 0; }

  /* multi-select answer states for the gender screen */
  .answer.selectable {
    position: relative;
    padding-right: 44px;
  }
  .answer.selectable::after {
    content: '';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--parchment-shadow);
    border-radius: 3px;
    background: rgba(241, 226, 179, 0.6);
    transition: all 0.15s ease;
  }
  .answer.selectable.selected {
    background: rgba(122, 42, 42, 0.10);
    border-left-color: var(--burgundy);
  }
  .answer.selectable.selected::after {
    background: var(--burgundy);
    border-color: var(--burgundy);
    content: '✓';
    color: var(--parchment);
    font-size: 0.9rem;
    text-align: center;
    line-height: 18px;
    font-family: 'Cinzel', serif;
    font-weight: 700;
  }

  .helper-text {
    text-align: center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-faded);
    font-size: 0.88rem;
    margin: 14px 0 0;
  }

  .btn[disabled] {
    opacity: 0.45;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* ----------- FULL CAST ACCORDION ----------- */
  .cast-section {
    margin-top: 28px;
    animation: fade-in 0.5s ease both;
  }
  .cast-group {
    margin-top: 22px;
  }
  .cast-group-title {
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.32em;
    color: var(--gold-deep);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 4px;
  }
  .cast-group-subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-faded);
    font-size: 0.88rem;
    text-align: center;
    margin-bottom: 12px;
  }
  details.cast-entry {
    border-top: 1px dashed var(--parchment-shadow);
    padding: 0;
    margin: 0;
  }
  details.cast-entry:last-of-type {
    border-bottom: 1px dashed var(--parchment-shadow);
  }
  details.cast-entry summary {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 4px;
    cursor: pointer;
    list-style: none;
    transition: background 0.15s ease;
  }
  details.cast-entry summary::-webkit-details-marker { display: none; }
  details.cast-entry summary:hover { background: rgba(184, 146, 58, 0.08); }
  details.cast-entry summary:active { background: rgba(122, 42, 42, 0.06); }
  .cast-entry-text { flex: 1; }
  .cast-entry-name {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    color: var(--forest-deep);
    font-size: 1.02rem;
    line-height: 1.2;
  }
  .cast-entry-epithet {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-faded);
    font-size: 0.88rem;
    margin-top: 2px;
  }
  .cast-chevron {
    color: var(--gold-deep);
    font-size: 0.95rem;
    transition: transform 0.25s ease;
    flex-shrink: 0;
    line-height: 1;
  }
  details.cast-entry[open] .cast-chevron {
    transform: rotate(90deg);
    color: var(--burgundy);
  }
  .cast-entry-body {
    padding: 4px 4px 18px;
    animation: fade-in 0.35s ease both;
  }
  .cast-entry-short {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 0.98rem;
    margin-bottom: 10px;
  }
  .cast-entry-desc {
    color: var(--ink);
    font-size: 0.97rem;
    line-height: 1.55;
    margin-bottom: 12px;
  }
  .cast-entry-deepcut, .cast-entry-styling {
    margin: 10px 0;
    padding: 12px 14px;
    border-radius: 2px;
    font-size: 0.93rem;
    line-height: 1.5;
  }
  .cast-entry-deepcut {
    background: rgba(42, 70, 40, 0.06);
    border-left: 3px solid var(--burgundy);
    color: var(--ink-soft);
  }
  .cast-entry-styling {
    background: rgba(184, 146, 58, 0.10);
    border-left: 3px solid var(--gold);
    color: var(--ink-soft);
  }
  .cast-entry-deepcut strong, .cast-entry-styling strong {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    display: block;
    margin-bottom: 5px;
  }
  .cast-entry-deepcut strong { color: var(--burgundy); }
  .cast-entry-styling strong { color: var(--gold-deep); }
  .progress-bar {
    height: 3px;
    background: rgba(184, 146, 58, 0.22);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 22px;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--gold-deep), var(--gold-bright), var(--amber));
    transition: width 0.45s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .question-num {
    text-align: center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--gold-deep);
    font-size: 0.95rem;
    margin-bottom: 6px;
    letter-spacing: 0.08em;
  }
  .question-text {
    font-family: 'Cinzel', serif;
    font-weight: 500;
    font-size: 1.22rem;
    color: var(--forest-deep);
    text-align: center;
    line-height: 1.3;
    margin: 8px 0;
  }

  /* ----------- RESULTS ----------- */
  .result-hero {
    text-align: center;
    margin-top: 8px;
  }
  .result-eyebrow {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--gold-deep);
    font-size: 1.02rem;
    letter-spacing: 0.04em;
  }
  .result-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.85rem;
    color: var(--forest-deep);
    margin: 6px 0 4px;
    line-height: 1.15;
  }
  .result-epithet {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--burgundy);
    font-size: 1.08rem;
    margin-bottom: 14px;
  }
  .result-desc {
    color: var(--ink);
    font-size: 1.04rem;
    margin: 12px 0;
    line-height: 1.55;
  }
  .result-desc.lead { font-style: italic; color: var(--ink-soft); font-size: 1.07rem; }
  .result-deepcut {
    margin: 16px 0 8px;
    padding: 14px 16px;
    background: rgba(42, 70, 40, 0.07);
    border-left: 3px solid var(--burgundy);
    border-radius: 2px;
    font-size: 0.97rem;
    color: var(--ink-soft);
  }
  .result-deepcut strong { color: var(--burgundy); font-family: 'Cinzel', serif; font-size: 0.74rem; letter-spacing: 0.22em; text-transform: uppercase; display: block; margin-bottom: 6px; }

  .result-styling {
    margin: 12px 0 8px;
    padding: 14px 16px;
    background: rgba(184, 146, 58, 0.10);
    border-left: 3px solid var(--gold);
    border-radius: 2px;
    font-size: 0.97rem;
    color: var(--ink-soft);
    line-height: 1.55;
  }
  .result-styling strong { color: var(--gold-deep); font-family: 'Cinzel', serif; font-size: 0.74rem; letter-spacing: 0.22em; text-transform: uppercase; display: block; margin-bottom: 6px; }
  .result-styling em { color: var(--ink); font-style: normal; font-weight: 600; font-family: 'Cinzel', serif; font-size: 0.78rem; letter-spacing: 0.06em; }

  /* runner-up + dark horse */
  .runners-up { margin-top: 26px; }
  .runner {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 0;
    border-top: 1px dashed var(--parchment-shadow);
  }
  .runner-rank {
    font-family: 'Cinzel', serif;
    font-size: 1.4rem;
    color: var(--gold-deep);
    font-weight: 700;
    line-height: 1;
    min-width: 30px;
  }
  .runner-body { flex: 1; }
  .runner-name {
    font-family: 'Cinzel', serif;
    font-weight: 600;
    color: var(--forest-deep);
    font-size: 1.05rem;
  }
  .runner-epithet {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-soft);
    font-size: 0.92rem;
    margin-bottom: 4px;
  }
  .runner-desc {
    color: var(--ink-soft);
    font-size: 0.95rem;
    line-height: 1.45;
  }

  .section-title {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 0.78rem;
    letter-spacing: 0.32em;
    color: var(--gold-deep);
    text-transform: uppercase;
    margin: 8px 0 2px;
  }
  .section-subtitle {
    text-align: center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-faded);
    font-size: 0.92rem;
    margin-bottom: 2px;
  }

  /* dark horse — distinct treatment */
  .darkhorse-card {
    margin-top: 32px;
    padding: 26px 18px 18px;
    background: linear-gradient(to bottom, rgba(22, 38, 26, 0.06), rgba(122, 42, 42, 0.07));
    border: 1px solid var(--parchment-shadow);
    border-top: 2px solid var(--burgundy);
    border-radius: 3px;
    position: relative;
  }
  .darkhorse-label {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--parchment);
    padding: 3px 14px;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    color: var(--burgundy);
    text-transform: uppercase;
    font-weight: 600;
    line-height: 1;
  }
  .darkhorse-subtitle {
    text-align: center;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--ink-faded);
    font-size: 0.9rem;
    margin: 0 0 14px;
  }
  .darkhorse-name {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    color: var(--forest-deep);
    font-size: 1.2rem;
    text-align: center;
  }
  .darkhorse-epithet {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--burgundy);
    font-size: 0.98rem;
    text-align: center;
    margin: 4px 0 10px;
  }
  .darkhorse-desc {
    color: var(--ink-soft);
    font-size: 0.97rem;
    line-height: 1.5;
  }

  /* party CTA at end */
  .party-cta {
    margin-top: 28px;
    padding: 22px 18px;
    background: var(--forest-deep);
    border-radius: 3px;
    color: var(--parchment);
    text-align: center;
    background-image:
      radial-gradient(circle at top, rgba(230,185,74,0.18), transparent 60%),
      radial-gradient(circle at 20% 80%, rgba(209,138,58,0.12), transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(209,138,58,0.10), transparent 40%);
    box-shadow: inset 0 0 0 1px var(--gold-deep);
    position: relative;
  }
  .party-cta .eyebrow { color: var(--gold-bright); }
  .party-cta p { font-family: 'IM Fell English', serif; font-style: italic; font-size: 1.05rem; margin-top: 8px; color: var(--parchment); }
  .party-cta strong { font-family: 'Cinzel', serif; font-style: normal; font-weight: 600; }

  .share-row { display: flex; gap: 10px; margin-top: 16px; }
  .share-row .btn { flex: 1; margin-top: 0; }

  .toast {
    position: fixed;
    bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--forest-deep);
    color: var(--parchment);
    padding: 10px 18px;
    border-radius: 24px;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ----------- ANIMATIONS ----------- */
  .screen { animation: fade-in 0.45s ease both; }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .stagger > * { animation: fade-in 0.4s ease both; }
  .stagger > *:nth-child(1) { animation-delay: 0.05s; }
  .stagger > *:nth-child(2) { animation-delay: 0.12s; }
  .stagger > *:nth-child(3) { animation-delay: 0.19s; }
  .stagger > *:nth-child(4) { animation-delay: 0.26s; }
  .stagger > *:nth-child(5) { animation-delay: 0.33s; }
  .stagger > *:nth-child(6) { animation-delay: 0.40s; }
  .stagger > *:nth-child(7) { animation-delay: 0.47s; }

  .reveal { animation: reveal 0.75s cubic-bezier(0.22, 1, 0.36, 1) both; }
  @keyframes reveal {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* gentle pulse on the firework center dot */
  @keyframes twinkle {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .firework-divider svg .core { animation: twinkle 2.5s ease-in-out infinite; }

  /* footer */
  .footer {
    text-align: center;
    margin-top: 24px;
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.85rem;
    color: var(--ink-faded);
  }

  @media (max-width: 380px) {
    body { padding: 10px; padding-top: max(14px, env(safe-area-inset-top)); }
    .scroll { padding: 26px 18px 28px; }
    h1 { font-size: 1.42rem; }
    .question-text { font-size: 1.12rem; }
    .result-name { font-size: 1.55rem; }
    .answer { font-size: 0.98rem; padding: 12px 14px; }
  }
</style>
</head>

<script>
/* ============================================================
   OUTCOMES — characters, places, and things
   ============================================================ */
const CHARACTERS = {
  frodo: {
    name: "Frodo Baggins",
    epithet: "Ring-bearer of the Shire",
    short: "Quiet, bookish, and braver than you ever wanted to be.",
    desc: "You're the reluctant one. You'd rather be reading by the fire than carrying the weight of the world, but when no one else will, you do. You don't make a show of it. People underestimate how much it costs you.",
    deepcut: "Frodo was 50 when he left the Shire, the same age Bilbo was when he left for Erebor. Tolkien gave him that age on purpose.",
    styling: "A brown or olive waistcoat over a loose white shirt, cuffed trousers ending mid-calf, and either bare feet or furry hobbit-foot covers. Watchful, slightly weary, hand resting near your chest pocket. Thrift stores cover the base outfit; Etsy and Amazon for the foot covers and a leaf-clasp brooch."
  },
  sam: {
    name: "Samwise Gamgee",
    epithet: "Gardener, cook, and best friend in all of Middle-earth",
    short: "Loyal to the bone, practical, and underestimated by everyone except the people who matter.",
    desc: "You're the reason your friends get home alive. You bring the rope, the pans, the salt, and the courage nobody expected. The world ends and starts again on the shoulders of people like you, and the elves know it even if no one else does.",
    deepcut: "Sam is the one who actually puts the Ring on. He's offered a vision of becoming Samwise the Strong, a gardener-king. He turns it down because the gardens would be too big to manage.",
    styling: "Patched brown waistcoat, suspenders, white shirt with sleeves rolled, smudges of dirt at the knees. A small frying pan on your belt and a coil of rope over your shoulder sells it. Earnest, attentive, never far from your best friend. Thrift store for the clothes, hardware store for the rope, any kitchen aisle for the pan."
  },
  aragorn: {
    name: "Aragorn",
    epithet: "Strider, the King in hiding",
    short: "You'd rather be on the road than on a throne.",
    desc: "Quietly competent, annoyingly handsome, and so unhurried that everyone around you feels rushed. You've spent decades doing the work nobody sees, and you'll keep doing it whether they ever recognize you for it. The crown is incidental.",
    deepcut: "Aragorn was 87 when he met Frodo at the Prancing Pony. Dúnedain age very, very well.",
    styling: "Dark muted layers in forest green, charcoal, or black. A long traveling cloak, knee-high boots, leather bracers, three days of stubble. A sword at your hip if you have one. Stand in corners and observe before you speak. Renaissance-fair sellers on Etsy or Amazon do bracers and cloaks well; the rest is your closet."
  },
  gandalf: {
    name: "Gandalf the Grey",
    epithet: "Wandering wizard, lighter of fireworks",
    short: "You know more than you say, and you say more than people want to hear.",
    desc: "You turn up at the right moment with the right answer and you refuse to explain how you knew. Mysterious in a slightly performative way. You're also the most fun person at the party once you sit down, which doesn't happen often.",
    deepcut: "Gandalf is a Maia, an immortal spirit older than the world itself, sent specifically to oppose Sauron. He's been doing this for two thousand years. He's earned the fireworks.",
    styling: "A long gray robe, a pointed gray hat (or blue, if you're going Hobbit-era), a great white beard, and a wooden staff. Be cryptic. Refuse to give direct answers. Cause minor chaos. Halloween shops have passable wizard kits; Etsy has the better staffs and hats if you want the real thing."
  },
  eowyn: {
    name: "Éowyn",
    epithet: "Shieldmaiden of Rohan",
    short: "Restless, fierce, and tired of being told to stay behind.",
    desc: "You will ride out anyway. You will cut down the king of the undead. You will surprise everyone, possibly including yourself. And then, when it's done, you'll choose peace and a garden, because you've earned the right to choose anything.",
    deepcut: "Éowyn's name in Old English means 'horse-joy.' Tolkien named her like a poem before she ever drew a sword.",
    styling: "A long pale dress (white or sage) under a leather-belted overdress, hair loose or in one long braid. If you're going full battle, swap in a chainmail or leather tunic and carry a sword. Pace restlessly. When someone says women can't, smile slowly. Etsy and ren-fair vendors carry it all."
  },
  galadriel: {
    name: "Galadriel",
    epithet: "Lady of Lothlórien",
    short: "Ancient, luminous, and a little terrifying when you smile a certain way.",
    desc: "You hold quiet power. You see further than most. You could have taken the Ring and ruled the world as a queen 'beautiful and terrible as the dawn,' and you said no, and you went into the West instead. That refusal is the most powerful thing you ever did.",
    deepcut: "Galadriel personally knew Fëanor in the First Age and refused to give him a lock of her hair three times. She gave Gimli three. Gimli won.",
    styling: "A long flowing white or silver gown, loose hair, minimal but striking silver jewelry, a simple circlet across the brow. Speak softly. Hold eye contact two seconds too long. Occasionally look at something nobody else can see. Thrift for the dress, Etsy for the elvish circlet and rings."
  },
  treebeard: {
    name: "Treebeard",
    epithet: "Fangorn, Eldest of the Ents",
    short: "You take your time. You take your time. You take your time.",
    desc: "You have outlasted empires by refusing to be rushed, and when you finally act, mountains get nervous. You're the patient one in every group chat, the one who answers a week later with the answer that actually mattered.",
    deepcut: "Treebeard is likely the oldest living being in Middle-earth during the War of the Ring, older than Galadriel, older than Sauron. He remembers a time before there were any Elves.",
    styling: "All brown and moss-green layers under a long rough cloak, with silk leaves and small branches attached at the shoulders and hood. Bushy fake eyebrows are non-negotiable. Speak. Very. Slowly. Pause mid-sentence to think for a while. Craft stores (Michaels, Hobby Lobby) for leaves and twigs; thrift for the base layers."
  },
  bombadil: {
    name: "Tom Bombadil",
    epithet: "Master of wood, water, and hill",
    short: "Vibes incarnate. The Ring does nothing to you.",
    desc: "You are probably the most powerful being in any room you walk into, and you genuinely do not care. You'd rather be singing nonsense to a river. You wear blue boots. Sauron is afraid of you, and nobody, including Tolkien, can fully explain why.",
    deepcut: "At the Council of Elrond they briefly considered just giving Tom the Ring. They concluded he'd lose it, because he wouldn't think it mattered. They weren't wrong.",
    styling: "Be the most outrageous outfit in the room. A bright blue jacket, yellow boots (rain boots painted yellow if needed), a tall feathered hat, suspenders. Sing and rhyme. Hand people flowers for no reason. Thrift stores and Etsy for the wild colors; vintage shops for the hat."
  },
  faramir: {
    name: "Faramir",
    epithet: "Captain of Gondor, the quieter son",
    short: "Thoughtful, gentle-hearted, and always slightly overlooked next to flashier siblings.",
    desc: "You'd rather read old stories than win new wars, but you'll fight beautifully if you have to. You're the rare person who can hold the Ring in your hand, recognize what it is, and say 'no, this is not for me' without raising your voice. Your father didn't deserve you.",
    deepcut: "In the books, Faramir resists the Ring instantly and easily, which is nothing like the film version. Tolkien wrote a letter complaining that the films would inevitably get this wrong. He was right.",
    styling: "A dark green Ranger of Ithilien tunic over a long-sleeve shirt, leather vest, brown trousers, tall boots, and a hooded cloak. Thoughtful, well-spoken, quietly capable. Quote old poetry if you remember any. Renaissance-fair sites and Etsy stock the tunic and cloak; the rest is thrift."
  },
  glorfindel: {
    name: "Glorfindel",
    epithet: "Elf-lord of Rivendell (the one the movies cut)",
    short: "Reborn Balrog-slayer with a glowing white horse and an attitude problem.",
    desc: "You died slaying a Balrog in the First Age, came back, and now you ride around being unreasonably powerful while everyone else makes do. You're the most overpowered character in the book, and almost nobody remembers your name, because Peter Jackson handed your scenes to Arwen. You don't mind. You've been dead. None of this fazes you.",
    deepcut: "Glorfindel is the only Elf in Middle-earth re-embodied by the Valar after death. He is, functionally, an angel with a sword. We have not forgiven the films.",
    styling: "Full white-and-gold elven robes, a long blond wig with intricate braids, the regal posture of someone who has died once already. A sword and a small glowing pendant (LED tea light tucked into a pouch) push it over the top. Mention the First Age at least once. Cosplay sites and Etsy for the robe and wig."
  },
  fatty: {
    name: "Fredegar 'Fatty' Bolger",
    epithet: "The hobbit who stayed behind",
    short: "The most underrated hobbit in the books, and the Shire owes you.",
    desc: "While Frodo went east, you stayed at Crickhollow pretending to be him. You faced down the Black Riders alone in an empty house and survived. Then, when Sharkey's men took over the Shire, you raised a rebellion and got thrown into the Lockholes for it. You came out thin. You came out a hero. Almost no one ever talks about you. We are talking about you.",
    deepcut: "Fatty's friends still call him Fatty after his Lockholes ordeal. Hobbits are not subtle. He probably preferred it that way.",
    styling: "Standard hobbit garb (waistcoat, suspenders, cuffed trousers, peasant shirt) with extra padding underneath. A pillow under the waistcoat does the job. Nervous at first, then increasingly brave. Glance around as if expecting Black Riders. Thrift covers everything; Etsy for the foot covers if you want them."
  },
  maggot: {
    name: "Farmer Maggot",
    epithet: "Mushroom farmer of the Marish",
    short: "Bigger than expected, with three enormous dogs and a complicated past.",
    desc: "Frodo is terrified of you because of an incident with mushrooms decades ago. You also happen to be friends with Tom Bombadil, which makes you considerably more dangerous than you look. You feed strangers, you know more than you let on, and your dogs are named Grip, Fang, and Wolf, which tells you everything.",
    deepcut: "Tolkien originally wrote Farmer Maggot as a villain in early drafts, then rewrote him into a quiet ally with a Bombadil connection. Retroactively, that makes him one of the most interesting minor hobbits in the legendarium.",
    styling: "Working hobbit clothes: heavy boots, sturdy work pants, suspenders, sleeves rolled up, a brimmed hat. A pipe in hand and a basket of mushrooms if you want to commit. Suspicious of strangers. Mention your dogs unprompted. Thrift store for the workwear, smoke shop or Amazon for a fake pipe."
  },
  lobelia: {
    name: "Lobelia Sackville-Baggins",
    epithet: "Umbrella-wielding patriot",
    short: "Mean, petty, and obsessed with what's yours and what's hers.",
    desc: "You spent fifty years being a hobbit nobody liked. Then Sharkey's men came for the Shire, and you struck the first blow with your umbrella, and you got thrown in the Lockholes for it, and you came out a folk hero. You gave Bag End back to Frodo and left him all your money. The Shire renamed you. So have we.",
    deepcut: "Lobelia was over 100 years old when she charged the Ruffians. Tolkien gave her the only on-page rebellion in the Scouring of the Shire's first act. Quietly one of the best hero arcs in the books.",
    styling: "Old-lady hobbit dress, a shawl, a hat with a feather. An umbrella is mandatory and should be used to gesture aggressively. Optional but iconic: pockets bulging with silver spoons. Disapprove visibly. Thrift store does the whole outfit; any umbrella will do."
  },
  beregond: {
    name: "Beregond",
    epithet: "Guard of the Citadel",
    short: "You did the right thing the wrong way and everyone knew it.",
    desc: "You broke ranks. You abandoned your post. You killed your own captain, all of it to save Faramir from being burned alive by his own father in a tomb. You were technically court-martialed. They also made you Captain of the new royal White Guard. Sometimes loyalty means breaking the rules and accepting the consequences with a straight back.",
    deepcut: "Beregond is the only named character in the books who breaks his sworn duty and is rewarded for it. Aragorn's sentence: leave Minas Tirith, and serve Faramir in Ithilien for the rest of your life. Best banishment ever written.",
    styling: "Black and silver Gondorian guard tunic (with the White Tree if you can manage it) over chainmail or chainmail-print fabric, a tall winged helmet, a long sword. Stand at attention. Then, at some point in the night, dramatically break protocol. LARP and ren-fair sites carry the helmet and tunic."
  },
  quickbeam: {
    name: "Quickbeam (Bregalad)",
    epithet: "The hasty Ent",
    short: "You decided at the Entmoot in only a few hours. By Ent standards, you are reckless.",
    desc: "You sing. You laugh. You're an old soul who refuses to slow down. When the slow ones are still making up their minds, you've already marched on Isengard. The other Ents named you 'Quickbeam' as a joke. You took it as a compliment.",
    deepcut: "Quickbeam said yes to Merry and Pippin almost immediately because the Orcs had cut down his beloved rowan-trees. Even Ents have something they refuse to be patient about.",
    styling: "Treebeard, but lighter and brighter. Bright green layers with silk leaves and red berries (rowan, in case anyone asks) attached to your branches. Move fast for a tree. Laugh easily. Sing if you feel like it. Craft store and thrift cover everything."
  },
  /* ----- NEW: places and things ----- */
  ring: {
    name: "The One Ring",
    epithet: "The Ruling Ring",
    short: "Magnetic, persuasive, and very slightly suspicious.",
    desc: "You walk into a room and the temperature changes. You make a suggestion and it becomes the plan. You're charming, gold-shimmering, and absolutely the most fun person at the party, until everyone realizes they've been doing what you wanted for three hours. You'd probably make an excellent dark lord, which is exactly why your friends keep an eye on you.",
    deepcut: "The Ring has nothing to do with strength or stealth. It works by persuasion. It promises everyone exactly what they most want to do anyway. Galadriel, Gandalf, and Faramir all refused to even touch it for that reason. You should probably feel flattered.",
    styling: "All gold, head to toe. Gold jacket, gold pants, gold sneakers, gold body shimmer or paint, a large gold ring on a chain around your neck. Charm everyone. Suggest the next round. Slowly take over the conversation. Halloween shops and Amazon have the gold pieces; dollar store for the costume ring."
  },
  argonath: {
    name: "The Argonath",
    epithet: "Pillars of the Kings",
    short: "Tall, silent, and watching.",
    desc: "You stand at thresholds. People feel something change when they're near you, even if they can't articulate what. You don't talk much. You don't need to. You've outlasted the people who made you, and you'll outlast the people who pass under your gaze now. There's a quiet majesty to being you, and people who haven't been around you don't quite get it.",
    deepcut: "The two massive statues of Isildur and Anárion were carved at Gondor's northern border at the peak of the kingdom, as a warning to anyone arriving by river that they were entering somewhere serious. They're still there.",
    styling: "A long gray robe, gray face paint, a stone-textured crown (foam from a craft store, painted). Stand very still in doorways. Speak rarely. Look down on river crossings disapprovingly. Thrift and Amazon for the robe, craft store for the foam crown, theatrical face paint anywhere."
  },
  helmsdeep: {
    name: "Helm's Deep",
    epithet: "The Hornburg",
    short: "Backs against the wall, you become unkillable.",
    desc: "You're easy to live with when things are easy. But when everything's lost and the night is dark, you turn into a wall, a horn, an unbroken thing. The worst day of someone else's life is the day you're at your best. People remember they were saved by you, and so do you.",
    deepcut: "Helm's Deep is named for Helm Hammerhand, a king of Rohan so terrifying he was said to walk the snow alone at night, blowing his horn, before kicking enemies to death. The fortress took on his energy and never gave it back.",
    styling: "Go full medieval-fortress: layered stone-gray clothing (think tactical meets castle), a horn slung over your shoulder, heavy boots. Steady and unmoving. Show up early, be the last one standing, blow the horn at midnight. Hardware store or Amazon for an actual hunting horn; thrift for the gray layers."
  },
  ugluk: {
    name: "Uglúk",
    epithet: "Captain of the Uruk-hai",
    short: "Loud, decisive, intolerant of dithering.",
    desc: "You get things done. You do not tolerate slow people, weak excuses, or vague meetings. When you say the column moves, the column moves. Mordor and Isengard would have eaten each other alive if you hadn't held them together with sheer force of will, and frankly your team at work probably feels the same way. You'd die for your captain, because that's the job.",
    deepcut: "Uglúk is the only Uruk-hai competent enough to keep an inter-faction orc-band moving across all of Rohan for days. He's killed personally by Éomer, which, for an Uruk, is the equivalent of a named death in a Marvel movie. He earned it.",
    styling: "Full Uruk-hai if you're committed: leather armor, the white hand painted on your forehead, black and red face paint, optional prosthetic fangs. A simpler 'tactical orc warlord' look works too. Bark orders. Stomp. Eat aggressively. Halloween shops carry the orc kits; Amazon for the armor."
  },
  shadowfax: {
    name: "Shadowfax",
    epithet: "Lord of the Mearas",
    short: "Free, fast, and you will not be saddled.",
    desc: "You move faster than people around you. You answer to one person at most, sometimes none. You'll come when you choose to come, and when you do, the wind moves with you. You arrive when the wizards are out of options, and you leave the moment your work is done.",
    deepcut: "Shadowfax doesn't wear a saddle or bit. He chose Gandalf, not the other way around. The Mearas, the royal horses of Rohan, understand human speech and only let kings ride them. Shadowfax is the prince of them.",
    styling: "All white and silver, head to toe. White trousers, white sweater or shirt, a silver scarf trailing behind like a tail. White face paint optional but a strong move. Restless. Show up late, leave early, refuse to be saddled. Thrift for the whites; Etsy for horse-themed accessories."
  },
  eagles: {
    name: "The Great Eagles",
    epithet: "The Eagles of Manwë",
    short: "You show up at the last possible minute and fix everything.",
    desc: "People wonder, often, why you couldn't have just shown up earlier and saved everyone the trip. You can't explain it. There are rules. You answer to something older and stranger than they understand, and you only come when the situation has real weight. But when you come, you come fast, and you carry the survivors home.",
    deepcut: "The Eagles are servants of Manwë, the chief of the gods of Middle-earth. They don't take orders from anyone down here, which is why they only show up when the situation has cosmic weight. 'Why didn't the Eagles fly Frodo to Mount Doom' is, structurally, the wrong question.",
    styling: "A brown-and-gold layered cloak with feathers (craft store, or cut up a feather boa). A masquerade-style beak mask is the iconic finish. Show up at the last possible moment with a dramatic entrance. Carry someone out at the end of the night. Amazon for the mask, craft store for feathers."
  },
  /* ----- New: a few more women of Middle-earth ----- */
  rosie: {
    name: "Rosie Cotton",
    epithet: "Rose of Bywater",
    short: "Steady, warm-hearted, and the reason home is worth coming back to.",
    desc: "You're the one keeping the lamps lit. While the boys go off to save the world, you keep the Shire turning, you keep the Green Dragon serving, and you wait without ever making it a story about waiting. Sam came back to you because you were the whole point of coming back.",
    deepcut: "Rosie waited for Sam through the entire War of the Ring without a single letter or word of news. They were married within a year of his return, and she went on to have 13 children. Sam named the first one Elanor, after a flower in Lothlórien.",
    styling: "A simple green or russet hobbit-lass dress with an apron, hair pinned back loosely, a flower behind one ear. Cheerful and grounded. Always with somewhere to be. Look like you've just stepped out of the kitchen with something delicious. Thrift store for the dress, craft store for fake flowers."
  },
  goldberry: {
    name: "Goldberry",
    epithet: "Daughter of the River",
    short: "Ethereal, joyful, perpetually surrounded by water lilies.",
    desc: "You move through rooms like a song nobody else can quite hear. You laugh more than makes sense. The world is a brighter place when you're in it, and people leave your company feeling like they've been somewhere they can't quite describe. Tom married well.",
    deepcut: "Goldberry is one of the most genuinely mysterious beings in Middle-earth. Tolkien never explained what she is, exactly. She's older than the river, younger than the stars, and she has the only documented marriage to Tom Bombadil. That is approximately all anyone knows.",
    styling: "A flowing green or silver-blue gown with a belt of gold leaves, hair long and loose, a crown of water lilies. Float through the room. Laugh easily. Look slightly damp around the edges in the best possible way. Thrift for the dress, craft store for the lilies."
  },
  ioreth: {
    name: "Ioreth",
    epithet: "Wise-woman of the Houses of Healing",
    short: "Talks too much, knows too much, saved the King.",

let scores = {};
let currentQ = 0;
let userGenders = new Set(); // chosen pronoun options: 'he', 'she', 'they', or empty for no preference
let answerHistory = []; // points awarded per question, for back-navigation undo
let quizQuestions = []; // questions for this attempt, shuffled (Q1 fixed, answers randomized)
const scrollEl = document.getElementById('scroll');
const toastEl = document.getElementById('toast');

/* Fisher-Yates shuffle, returns a new array. */
function shuffled(arr) {
  const out = arr.slice();
  for (let i = out.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
}

/* Build the question set for a single quiz attempt:
   - Q1 stays fixed as the soft opener (wooden box on doorstep)
   - Q2-Q10 are shuffled
   - Within every question, the answer order is randomized
   This runs once per attempt, in startQuiz(), so back-navigation
   and re-renders see a stable order. */
function buildQuizQuestions() {
  const first = QUESTIONS[0];
  const rest = shuffled(QUESTIONS.slice(1));
  return [first, ...rest].map(q => ({
    q: q.q,
    a: shuffled(q.a)
  }));
}

function toggleGender(g) {
  if (g === 'none') {
    // "Anything goes" is mutually exclusive with specific picks
    if (userGenders.has('none')) {
      userGenders.delete('none');
    } else {
      userGenders.clear();
      userGenders.add('none');
    }
  } else {
    // Picking a specific gender clears "Anything goes"
    userGenders.delete('none');
    if (userGenders.has(g)) {
      userGenders.delete(g);
    } else {
      userGenders.add(g);
    }
  }
  renderGenderSelect();
}

function startQuiz() {
  if (userGenders.size === 0) return; // safety: shouldn't happen since button is disabled
  currentQ = 0;
  answerHistory = [];
  quizQuestions = buildQuizQuestions();
  Object.keys(CHARACTERS).forEach(k => scores[k] = 0);
  showQuestion();
}

function showQuestion() {
  const q = quizQuestions[currentQ];
  const pct = (currentQ / quizQuestions.length) * 100;
  scrollEl.innerHTML = `
    <div class="screen">
      <button class="back-btn" onclick="goBack()"><span class="arrow">‹</span> Back</button>
      <div class="progress-row">
        <span>Question ${currentQ + 1} of ${quizQuestions.length}</span>
        <span>${Math.round(pct)}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

      <div class="question-num">~ ${romanize(currentQ + 1)} ~</div>
      <div class="question-text">${q.q}</div>
      <div class="firework-divider" style="margin: 10px auto 4px;">${fireworkSVG(18, 'var(--gold-deep)')}</div>

      <div class="answers stagger">
        ${q.a.map((opt, i) => `
          <button class="answer" onclick="pickAnswer(${i})">${opt.text}</button>
        `).join('')}
      </div>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function pickAnswer(idx) {
  const opt = quizQuestions[currentQ].a[idx];
  // Record the points awarded so we can undo on back-navigation
  answerHistory[currentQ] = opt.points;
  Object.entries(opt.points).forEach(([k, pts]) => {
    scores[k] = (scores[k] || 0) + pts;
  });
  currentQ++;
  if (currentQ >= quizQuestions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function goBack() {
  if (currentQ === 0) {
    // Back from first question returns to gender select, preserving the previous selection
    renderGenderSelect();
    return;
  }
  currentQ--;
  // Undo the points that were awarded for the question we just left
  const lastPoints = answerHistory[currentQ];
  if (lastPoints) {
    Object.entries(lastPoints).forEach(([k, pts]) => {
      scores[k] = (scores[k] || 0) - pts;
    });
    answerHistory[currentQ] = null;
  }
  showQuestion();
}

/* Pick the dark horse: highest-scoring outcome from the QUIRKY_POOL
   that isn't already in the top 2. Falls back gracefully if the filtered
   pool is small (e.g. only 4 'they/them' outcomes). */
function pickDarkHorse(rankedFiltered, topTwoKeys) {
  const candidates = rankedFiltered.filter(r => QUIRKY_POOL.includes(r.key) && !topTwoKeys.includes(r.key));
  if (candidates[0]) return candidates[0];
  const remaining = rankedFiltered.filter(r => !topTwoKeys.includes(r.key));
  return remaining[0] || rankedFiltered[2] || rankedFiltered[1] || rankedFiltered[0];
}

                  </div>
                  <div class="cast-entry-styling">
                    <strong>Dress the Part</strong>
                    ${c.styling}
                  </div>
                </div>
              </details>
            `;
          }).join('')}
        </div>
      `).join('')}
    </div>
  `;
}

function romanize(n) {
  const map = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV'];
  return map[n-1] || n;
}

async function shareResult(topKey, darkKey) {
  const top = CHARACTERS[topKey];
  const dark = CHARACTERS[darkKey];
  const url = window.location.href;
  const text = `I got ${top.name}, with ${dark.name} as the dark horse. Which LOTR character are you? (Sean & Tom's 40th, Aug 8)`;
  if (navigator.share) {
    try {
      await navigator.share({ title: "Which LOTR Character Are You?", text, url });
      return;
    } catch (e) { /* user cancelled */ }
  }
  try {
    await navigator.clipboard.writeText(`${text} ${url}`);
    showToast("Copied to clipboard");
  } catch (e) {
    showToast("Couldn't copy. Long-press the URL bar.");
  }
}

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2200);
}

/* boot */
showIntro();
